<!DOCTYPE html>

<html>

<head>
<title>Sthuthi Xerox - Order Status</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:100px;
background:#f5f5f5;
}

.container{
background:white;
padding:40px;
width:350px;
margin:auto;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:80%;
margin-top:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:15px;
font-size:16px;
cursor:pointer;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
}

.status{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.printing{
color:orange;
}

.ready{
color:green;
}

.completed{
color:blue;
}

</style>

</head>

<body>

<div class="container">

<h2>Sthuthi Xerox</h2>

<h3>Check Order Status</h3>

<input id="orderId" placeholder="Enter Order ID (SX-01)">

<br><br>

<button onclick="checkStatus()">Check Status</button>

<p id="result" class="status"></p>

</div>

<script>

const apiURL="https://script.google.com/macros/s/AKfycbwDtPT37S9Qbo7PUdk2PkUO0Mtj9XCfsIfl8Ag58RxeQXrXlsxXd2iCqLLMlHaHhkAjog/exec";

function checkStatus(){

let order=document.getElementById("orderId").value;

fetch(apiURL+"?order="+order)

.then(res=>res.json())

.then(data=>{

if(data.error){

document.getElementById("result").innerHTML="Order not found";

return;

}

let status=data.status;

let statusClass="";

if(status==="Printing") statusClass="printing";
if(status==="Ready for Pickup") statusClass="ready";
if(status==="Completed") statusClass="completed";

document.getElementById("result").innerHTML="Status : <span class='"+statusClass+"'>"+status+"</span>";

});

}

function autoLoad(){

const params=new URLSearchParams(window.location.search);

const order=params.get("order");

if(order){

document.getElementById("orderId").value=order;

checkStatus();

}

}

autoLoad();

</script>

</body>

</html>
