<!DOCTYPE html>

<html>
<head>
<title>Sthuthi Xerox - Order Tracking</title>
<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:0;
padding:0;
text-align:center;
}

.container{
background:white;
width:400px;
margin:60px auto;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
color:#8B2E2E;
}

.status{
font-size:22px;
font-weight:bold;
margin-top:15px;
}

.progress{
display:flex;
justify-content:space-between;
margin-top:30px;
}

.step{
width:25%;
}

.circle{
width:25px;
height:25px;
border-radius:50%;
background:#ddd;
margin:auto;
}

.active{
background:#4CAF50;
}

.label{
font-size:12px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>Sthuthi Xerox</h1>

<h3>Order Tracking</h3>

<p>Order ID:</p>
<h2 id="orderId"></h2>

<div class="status" id="status"></div>

<div class="progress">

<div class="step">
<div id="s1" class="circle"></div>
<div class="label">Order Received</div>
</div>

<div class="step">
<div id="s2" class="circle"></div>
<div class="label">Printing</div>
</div>

<div class="step">
<div id="s3" class="circle"></div>
<div class="label">Ready</div>
</div>

<div class="step">
<div id="s4" class="circle"></div>
<div class="label">Completed</div>
</div>

</div>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get("order");

document.getElementById("orderId").innerText = orderId;

const API = "https://script.google.com/macros/s/AKfycbwDtPT37S9Qbo7PUdk2PkUO0Mtj9XCfsIfl8Ag58RxeQXrXlsxXd2iCqLLMlHaHhkAjog/exec?order=" + orderId;

fetch(API)
.then(res => res.json())
.then(data => {

const status = data.status;

document.getElementById("status").innerText = "Status: " + status;

if(status=="Order Received"){
document.getElementById("s1").classList.add("active");
}

if(status=="Printing"){
document.getElementById("s1").classList.add("active");
document.getElementById("s2").classList.add("active");
}

if(status=="Ready for Pickup"){
document.getElementById("s1").classList.add("active");
document.getElementById("s2").classList.add("active");
document.getElementById("s3").classList.add("active");
}

if(status=="Completed"){
document.getElementById("s1").classList.add("active");
document.getElementById("s2").classList.add("active");
document.getElementById("s3").classList.add("active");
document.getElementById("s4").classList.add("active");
}

});

</script>

</body>
</html>
