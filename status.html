<!DOCTYPE html>

<html>
<head>

<title>Sthuthi Xerox - Check Order Status</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:350px;
}

h1{
color:#8B2E2E;
}

input{
padding:12px;
width:250px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#4CAF50;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
margin-top:15px;
cursor:pointer;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>🖨 Sthuthi Xerox</h1>

<h3>Check Order Status</h3>

<input id="orderId" placeholder="Enter Order ID (SX-01)">

<br>

<button onclick="checkStatus()">Check Status</button>

</div>

<script>

function checkStatus(){

var orderId=document.getElementById("orderId").value;

if(orderId==""){
alert("Please enter Order ID");
return;
}

window.location.href="tracking.html?order="+orderId;

}

</script>

</body>
</html>
